      /* ===== RESET GLOBAL ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {

        position: relative;
      }

      /* ===== MAIN STAGE (UNIFIED VISUAL PLANE) ===== */
      main.lp-stage {
        display: flex;
        flex-direction: column;
        width: 100%;
      }

      /* ===== HERO STAGE ===== */
      section.hero-stage {
        display: flex;
        flex-direction: column;
        width: 100%;
        background: transparent;
        position: relative;
        z-index: 10;
        margin-bottom: 0;
      }

      /* ===== HERO BANNER FRAME ===== */
      .hero-art-frame {
        width: 100%;
        background: transparent;
        display: block;
        position: relative;
        z-index: 5;
      }

      .hero-art-frame picture {
        display: block;
        width: 100%;
      }

      .hero-art-frame img {
        display: block;
        width: 100%;
        height: auto;
        max-width: 100%;
      }

      /* ===== HEADER ===== */
      header.lp-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        padding: 1rem;
        gap: 0.5rem;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: transparent;
      }

      .logo-symbol {
        width: 34px;
        height: 34px;
        object-fit: contain;
      }

      .logo-text {
        width: 44px;
        height: 34px;
        object-fit: contain;
      }

      /* ===== SCRIPT / CONTENT SECTION ===== */
      section.script-block {
        width: 100%;
        background: transparent;
        padding: 1.5rem 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 1rem;
        text-align: center;
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        transform: translateY(-50%);
        z-index: 50;
        transition: top 0.4s ease, transform 0.4s ease;
      }

      /* Eleva dinamicamente o formulário quando acionado para liberar espaco para o botão e logo logo abaixo */
      section.script-block.form-active {
        top: 48%; /* Elevação mais sutil (-2%) */
      }

      /* ===== SCRIPT TITLE (VISUALLY HIDDEN — mantém h1 acessível para crawlers e leitores de tela) ===== */
      .script-title {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* ===== SCRIPT TEXT ===== */
      .script-text {
        display: flex;
        flex-direction: column;
        gap: 0.375rem;
        font-family: "Familjen Grotesk", sans-serif;
        font-size: 0.9rem;
        font-weight: 400;
        color: #333;
        line-height: 1.4;
      }

      .script-text-line {
        margin: 0;
      }

      /* ===== CTA CONTAINER ===== */
      .cta-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.375rem;
        margin-top: 0.375rem;
      }

      /* ===== CTA BUTTON ===== */
      .btn-comecar {
        background-color: #FF5537;
        color: #ffffff;
        font-family: "Familjen Grotesk", sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        padding: 0.65rem 1.75rem;
        border-radius: 9999px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border: none;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .btn-comecar:hover {
        transform: scale(1.05);
        background-color: #E63F2A;
      }

      .btn-subtext {
        font-family: "Familjen Grotesk", sans-serif;
        font-size: 10px;
        color: #666;
        opacity: 0.7;
        margin-top: 0.25rem;
      }

      /* ===== FORM PANEL (HIDDEN BY DEFAULT) ===== */
      .script-form-panel {
        width: 100%;
        max-width: 320px;
        padding: 1.5rem 1rem;
        background: transparent;
        border-radius: 1rem;
        border: none;
        box-shadow: none;
        animation: fadeIn 0.6s ease-in-out;
        margin: 1rem auto 0;
      }

      @keyframes fadeIn {
        0% {
          opacity: 0;
          transform: translateY(-10px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ===== FOOTER SECTION (INTEGRATED) ===== */
      footer.lp-footer {
        width: 100%;
        background: transparent;
        padding: 1rem 1rem 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        position: absolute;
        bottom: auto;
        left: 0;
        right: 0;
        z-index: 40;
        overflow: visible;
      }

      .footer-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        width: 100%;
        max-width: 1200px;
      }

      .footer-logo-container {
        display: flex;
        justify-content: center;
        padding: 0.5rem 1rem;
        margin-bottom: 0.5rem;
        background-color: transparent;
        border-radius: 0.75rem;
      }

      .footer-logo {
        width: min(180px, 50vw);
        height: auto;
        object-fit: contain;
        transition: transform 0.3s ease, filter 0.3s ease;
        filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.15));
      }

      .footer-logo-container:hover .footer-logo {
        transform: scale(1.08);
        filter: drop-shadow(0 16px 45px rgba(0, 0, 0, 0.45));
      }

      .footer-copyright {
        text-align: center;
        color: #1F2937;
        font-family: "Familjen Grotesk", sans-serif;
        font-size: 10px;
        font-weight: 400;
        margin-top: 0.375rem;
        text-shadow: 0 1px 3px rgba(255, 255, 255, 0.5);
        line-height: 1.3;
      }

      .footer-copyright p {
        margin: 0;
      }

      .footer-guides {
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, transparent 0%, rgba(120, 120, 120, 0.2) 50%, transparent 100%);
        margin-top: 0.5rem;
        opacity: 0.5;
      }

      /* ===== COLLECTION GUIDES PREVIEW ===== */
      .collection-guides-preview {
        width: 100%;
        height: 15rem; /* Guias baseadas em 15rem */
        overflow: hidden;
        background: transparent;
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 35;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 0;
      }

      .guides-image {
        height: 100%;
        width: auto;
        object-fit: cover;
        object-position: top center;
        opacity: 0.78;
        transition: opacity 0.3s ease;
        display: block;
      }

      .collection-guides-preview:hover .guides-image {
        opacity: 0.92;
      }

        }

        .footer-copyright {
          font-size: 9px;
          margin-top: 0.25rem;
        }

        .footer-guides {
          margin-top: 0.375rem;
        }

        .collection-guides-preview {
          height: 16rem;
          top: auto;
          bottom: 0;

      /* ===== TABLET (640px–767px) ===== */
      @media (min-width: 640px) and (max-width: 767px) {
        section.hero-stage {
          margin-bottom: 0;

          padding: 1rem 1.25rem 0.5rem 1.25rem;
        }

        section.script-block {
          top: 56%;
          padding: 1rem 1.25rem;
          gap: 1rem;
        }

        footer.lp-footer {
          top: 69%; /* Reajuste em cascata da responsividade */
          padding: 0.5rem 1rem 0;
        }

        .collection-guides-preview {
          height: 17rem;
          top: auto;
          bottom: 0;
          z-index: 35;
        }

        .guides-image {

      /* ===== TABLET+ (min-width: 640px) ===== */
      @media (min-width: 640px) {
        header.lp-header {
          padding: 1.75rem 1.5rem 1rem 1.5rem;
        }

        .logo-symbol {
          width: 48px;
          height: 48px;
        }

        .logo-text {
          width: 60px;
          height: 48px;
        }

        .script-text {
          font-size: 1rem;
          gap: 0.75rem;
        }

        .btn-comecar {
          font-size: 1.1rem;
          padding: 0.7rem 2.25rem;
        }

        .btn-subtext {
          font-size: 12px;
        }

          max-width: 380px;
          padding: 2rem 1.5rem;

      /* ===== DESKTOP (min-width: 768px) ===== */
      @media (min-width: 768px) {

        /* — Hero Stage — */
        section.hero-stage {
          background: transparent;
          margin-bottom: 0;

        header.lp-header {

        .collection-guides-preview {
          height: 19rem;
          top: auto;
          bottom: 0;
          z-index: 35;
        }

        .guides-image {
          opacity: 0.78;
        }
      }

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // CSS Ready — sem dependência externa
        document.body.classList.add('css-ready');

        const btnComecar = document.getElementById("btnComecar");

        function handleStartAction() {
          const emailForm = document.getElementById("emailForm");
          const scriptText = document.querySelector(".script-text");
          const ctaContainer = document.querySelector(".cta-container");

          if (emailForm) {
            // Hide CTA and text to show form
            if (scriptText) scriptText.style.display = "none";
            if (ctaContainer) ctaContainer.style.display = "none";

            emailForm.style.display = "block";
            
            // Adiciona classe CSS pra subir o modal do form e evitar quebra visual com footer
            const scriptBlockElem = document.querySelector(".script-block");
            if (scriptBlockElem) {
              scriptBlockElem.classList.add("form-active");
            }

            // Auto-click Pingback "Começar" button
            setTimeout(() => {
              try {
                const pbForm = document.querySelector("pb-embeddable-form");
                if (pbForm && pbForm.shadowRoot) {
                  const shadowButtons = pbForm.shadowRoot.querySelectorAll("button");
                  if (shadowButtons && shadowButtons.length > 0) {
                    shadowButtons[0].click();
                    return;
                  }
                }
                if (pbForm) {
                  const buttons = pbForm.querySelectorAll("button");
                  if (buttons && buttons.length > 0) {
                    buttons[0].click();
                  }
                }
              } catch (e) {
                console.log("Auto-click (non-critical):", e);
              }
            }, 600);
          }
        }

        if (btnComecar) {
          btnComecar.addEventListener("click", handleStartAction);
          document.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
              handleStartAction();
            }
          });
        }
      });
    </script>
  </body>
</html>
